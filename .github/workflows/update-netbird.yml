name: NetBird updater

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-netbird:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Determine versions
        id: compare
        run: |
          latest_tag="$(curl -fsSL https://api.github.com/repos/netbirdio/netbird/releases/latest | jq -r '.tag_name')"
          if [ -z "$latest_tag" ]; then
            echo "Error: Failed to fetch latest NetBird version" >&2
            exit 1
          fi
          latest_version="${latest_tag#v}"
          current_full="$(jq -r '.netbirdVersion' plugin/plugin.json)"
          current_version="${current_full#netbird_}"
          current_version="${current_version%_linux_amd64}"
          echo "latest=${latest_version}" >> "$GITHUB_OUTPUT"
          echo "current=${current_version}" >> "$GITHUB_OUTPUT"
          if [ "$latest_version" != "$current_version" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when up to date
        if: steps.compare.outputs.update != 'true'
        run: echo "NetBird is already up to date."

      - name: Update plugin metadata
        if: steps.compare.outputs.update == 'true'
        id: plugin
        run: |
          new_version="${{ steps.compare.outputs.latest }}"
          new_full="netbird_${new_version}_linux_amd64"
          checksums_url="https://github.com/netbirdio/netbird/releases/download/v${new_version}/netbird_${new_version}_checksums.txt"
          new_sha="$(curl -fsSL "$checksums_url" | grep "${new_full}.tar.gz" | awk '{print $1}')"
          if [ -z "$new_sha" ]; then
            echo "Error: Failed to fetch SHA256 for ${new_full}.tar.gz" >&2
            exit 1
          fi
          tmp="$(mktemp)"
          jq --arg version "$new_full" --arg sha "$new_sha" \
            '.netbirdVersion=$version | .netbirdSHA256=$sha' \
            plugin/plugin.json > "$tmp"
          mv "$tmp" plugin/plugin.json
          echo "full_version=$new_full" >> "$GITHUB_OUTPUT"
          echo "sha=$new_sha" >> "$GITHUB_OUTPUT"

      - name: Commit and push branch
        if: steps.compare.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B chore/netbird-update
          git add plugin/plugin.json
          if git commit -m "chore: update NetBird to ${{ steps.compare.outputs.latest }}"; then
            git push --force origin chore/netbird-update
            echo "commit_made=true" >> $GITHUB_ENV
          else
            echo "No changes to commit."
            echo "commit_made=false" >> $GITHUB_ENV
          fi

      - name: Create or update PR
        if: steps.compare.outputs.update == 'true' && env.commit_made == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: update NetBird to ${{ steps.compare.outputs.latest }}" \
            --body "Automated update via workflow." \
            --head chore/netbird-update \
            --base main \
            --label chore \
            || gh pr edit chore/netbird-update \
              --title "chore: update NetBird to ${{ steps.compare.outputs.latest }}" \
              --body "Automated update via workflow."
